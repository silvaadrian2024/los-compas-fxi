<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Los Compas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background: linear-gradient(135deg, #0a1f0a 0%, #1a3a1a 50%, #0d2818 100%); min-height: 100vh; color: #fff; padding-bottom: 40px; }
  .header { position: relative; height: 220px; overflow: hidden; border-bottom: 4px solid #ffd700; }
  .header img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
  .header-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(10,31,10,0.95) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
  .header-overlay h1 { font-size: 2.5rem; font-weight: 900; color: #ffd700; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); letter-spacing: 2px; text-align: center; }
  .nav-bar { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 12px 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #ffd700; }
  .nav-btn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #0a1f0a; border: none; padding: 10px 18px; border-radius: 25px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 0.9rem; }
  .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
  .section-title { font-size: 1.8rem; color: #ffd700; margin-bottom: 20px; text-align: center; font-weight: 800; }
  .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.3); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
  .match-row { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; border-left: 4px solid #ffd700; }
  .action-btn { padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { background: linear-gradient(135deg, #1a3a1a, #0d2818); border: 2px solid #ffd700; border-radius: 15px; padding: 30px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
  .excel-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .excel-table th { background: #185a36; color: #fff; padding: 10px; }
  .excel-table td { padding: 8px; text-align: center; border: 1px solid rgba(255,215,0,0.15); }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #0a1f0a; padding: 15px 25px; border-radius: 10px; font-weight: 700; z-index: 2000; display: none; }
</style>
</head>
<body>

<div class="header">
  <img src="https://image.qwenlm.ai/public_source/73de5cfe-12cf-4f6c-9137-4c74680acd7a/1004a1730-e7f3-4608-abc5-012a6c9afffa.png" alt="Fútbol">
  <div class="header-overlay">
    <h1>⚽ QUINIELAS LOS COMPAS ⚽</h1>
  </div>
</div>

<div class="nav-bar">
  <button class="nav-btn" onclick="openModal('paymentModal')">💳 Pago</button>
  <button class="nav-btn" onclick="generatePlayerPDF()">📄 PDF</button>
  <button class="nav-btn" onclick="openModal('adminModal')">🔒 Admin</button>
</div>

<div class="container">
  <div class="card" id="matchesContainer">Cargando partidos...</div>
  <div class="card" id="quinielasList">Las quinielas aparecerán aquí.</div>
</div>

<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('paymentModal')">✕</button>
    <h2>💳 Métodos de Pago</h2>
    <div id="paymentMethodsDisplay"></div>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('adminModal')">✕</button>
    <div id="adminLogin">
      <h2>🔒 Login Admin</h2>
      <input type="email" id="adminEmail" placeholder="Correo">
      <input type="password" id="adminPass" placeholder="Contraseña">
      <button class="action-btn" onclick="checkAdmin()">Entrar</button>
    </div>
    <div id="adminPanel" style="display:none">
      <div class="tab-buttons">
        <button class="tab-btn" onclick="switchTab('matches')">Partidos</button>
        <button class="tab-btn" onclick="switchTab('results')">Resultados</button>
        <button class="tab-btn" onclick="switchTab('excel')">Excel</button>
      </div>
      <div id="tab-matches" class="tab-content">...</div>
      <div id="tab-results" class="tab-content">...</div>
      <div id="tab-excel" class="tab-content">
        <table class="excel-table"><thead id="excelThead"></thead><tbody id="excelTbody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var db = firebase.firestore();
  var state = { matches: [], quinielas: [], currentSelection: {}, matchResults: {}, winnersCalculated: false };

  // Funciones core expuestas al objeto window
  window.openModal = function(id) { document.getElementById(id).classList.add('active'); };
  window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); };
  window.showToast = function(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); };
  
  window.renderExcelRows = function() {
    var tbody = document.getElementById('excelTbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    state.quinielas.forEach(function(q) {
      var preds = q.predictions.split('');
      var aciertos = 0;
      if (state.winnersCalculated) {
        preds.forEach((p, i) => { if (state.matchResults[i] === p) aciertos++; });
      }
      var html = '<tr><td>'+q.folio+'</td><td>'+q.name+'</td>';
      preds.forEach(p => html += '<td>'+p+'</td>');
      html += '<td>'+(q.paid ? '✅' : '⬜')+'</td><td>'+(state.winnersCalculated ? aciertos : '-')+'</td></tr>';
      tbody.innerHTML += html;
    });
  };

  // Inicialización (Firebase listener)
  db.collection("configuracion").doc("jornadaActual").onSnapshot(function(doc) {
    if (doc.exists) {
      var data = doc.data();
      state.matches = data.matches || [];
      state.matchResults = data.matchResults || {};
      state.winnersCalculated = data.winnersCalculated || false;
      window.renderExcelRows();
    }
  });

  db.collection("quinielas").onSnapshot(function(snap) {
    state.quinielas = [];
    snap.forEach(doc => state.quinielas.push({...doc.data(), id: doc.id}));
    window.renderExcelRows();
  });

})();
</script>
</body>
</html>
