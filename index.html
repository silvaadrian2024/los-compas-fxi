<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Los Compas</title>
<!-- Firebase SDK v9 Compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
  /* Aquí va tu CSS original, asegúrate de mantenerlo dentro de <style> */
  body { background: linear-gradient(135deg, #0a1f0a 0%, #1a3a1a 50%, #0d2818 100%); min-height: 100vh; color: #fff; font-family: 'Segoe UI', sans-serif; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #0d2818; border: 2px solid #ffd700; border-radius: 15px; padding: 30px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
  .excel-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .excel-table th, .excel-table td { padding: 8px; border: 1px solid #ffd700; text-align: center; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .sync-status { padding: 10px; margin: 10px; border-radius: 8px; text-align: center; }
  .online { background: #1e5a1e; color: #4caf50; }
  .offline { background: #5a1e1e; color: #ff4444; }
</style>
</head>
<body>

<div class="nav-bar">
  <button class="nav-btn" onclick="window.openModal('paymentModal')">💳 Pago</button>
  <button class="nav-btn" onclick="window.generatePlayerPDF()">📄 PDF</button>
  <button class="nav-btn" onclick="window.openModal('adminModal')">🔒 Admin</button>
</div>

<div class="container">
  <div class="sync-status offline" id="syncStatus">⚠️ Firebase NO configurado</div>
  <div id="matchesContainer">Cargando partidos...</div>
</div>

<!-- Modal Admin -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <button onclick="window.closeModal('adminModal')">✕</button>
    <div id="adminLogin">
      <input type="email" id="adminEmail" placeholder="Correo">
      <input type="password" id="adminPass" placeholder="Contraseña">
      <button onclick="window.checkAdmin()">Entrar</button>
    </div>
    <div id="adminPanel" style="display:none">
      <button onclick="window.switchTab('excel')">📊 Excel</button>
      <div id="tab-excel" class="tab-content active">
        <table class="excel-table"><thead id="excelThead"></thead><tbody id="excelTbody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // 1. CONFIGURACIÓN REAL DE TU PROYECTO
  const firebaseConfig = {
    apiKey: "AIzaSyA9GGiIBo636l7wNt1dXSKvVHaS_jga7rA",
    authDomain: "quiniela-los-compas.firebaseapp.com",
    projectId: "quiniela-los-compas",
    storageBucket: "quiniela-los-compas.firebasestorage.app",
    messagingSenderId: "885487506648",
    appId: "1:885487506648:web:f90154096ecf98fb6773ad"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();
  var state = { matches: [], quinielas: [], matchResults: {}, winnersCalculated: false };

  // 2. EXPOSICIÓN GLOBAL
  window.openModal = id => document.getElementById(id).classList.add('active');
  window.closeModal = id => document.getElementById(id).classList.remove('active');
  window.switchTab = tab => { 
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
  };

  // 3. LÓGICA DE EXCEL CON CÁLCULO DE ACIERTOS
  window.renderExcelTable = function() {
    var tbody = document.getElementById('excelTbody');
    var thead = document.getElementById('excelThead');
    if (!tbody || !thead) return;

    var h = '<tr><th>Folio</th><th>Nombre</th>';
    state.matches.forEach((_, i) => h += '<th>P'+(i+1)+'</th>');
    h += '<th>Pago</th><th>Aciertos</th></tr>';
    thead.innerHTML = h;

    tbody.innerHTML = '';
    state.quinielas.forEach(function(q) {
      var preds = q.predictions.split('');
      var aciertos = 0;
      if (state.winnersCalculated) {
        preds.forEach((p, i) => { if (state.matchResults[i] === p) aciertos++; });
      }
      var html = '<tr><td>'+q.folio+'</td><td>'+q.name+'</td>';
      preds.forEach(p => html += '<td>'+p+'</td>');
      html += '<td><button onclick="window.togglePaid(\''+q.id+'\')">'+(q.paid ? '✅' : '⬜')+'</button></td><td>'+(state.winnersCalculated ? aciertos : '-')+'</td></tr>';
      tbody.innerHTML += html;
    });
  };

  window.togglePaid = function(id) {
    var q = state.quinielas.find(x => x.id === id);
    if (q) db.collection("quinielas").doc(id).update({ paid: !q.paid });
  };

  // 4. INICIALIZACIÓN
  db.collection("configuracion").doc("jornadaActual").onSnapshot(doc => {
    if (doc.exists) {
      var d = doc.data();
      state.matches = d.matches || [];
      state.matchResults = d.matchResults || {};
      state.winnersCalculated = d.winnersCalculated || false;
      document.getElementById('syncStatus').innerHTML = '✅ Conectado a Firebase';
      document.getElementById('syncStatus').className = 'sync-status online';
      window.renderExcelTable();
    }
  });

  db.collection("quinielas").onSnapshot(snap => {
    state.quinielas = [];
    snap.forEach(doc => state.quinielas.push({...doc.data(), id: doc.id}));
    window.renderExcelTable();
  });
})();
</script>
</body>
</html>
